<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Панель менеджера — DetalHub</title>
  <link rel="stylesheet" href="cabinet.css">
  <style>
    .badge-work    { background:#fef3cd; color:#856404; }
    .badge-work::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.6; margin-right:5px; display:inline-block; }
    .badge-manual  { background:#fff8ed; color:#b45309; }
    .badge-manual::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.6; margin-right:5px; display:inline-block; }
    .badge-cancel  { background:#fee2e2; color:#b91c1c; }
    .badge-cancel::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.6; margin-right:5px; display:inline-block; }
    .stat-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:10px; padding:16px 20px; border:1px solid var(--gray-200); }
    .stat-val { font-size:26px; font-weight:700; color:var(--navy); }
    .stat-label { font-size:12px; color:var(--gray-400); margin-top:2px; }
    .filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .filter-btn { padding:5px 14px; border-radius:20px; border:1px solid var(--gray-200); background:#fff; font-size:12px; font-weight:500; cursor:pointer; color:var(--gray-700); transition:all .15s; }
    .filter-btn.active, .filter-btn:hover { background:var(--navy); color:#fff; border-color:var(--navy); }
    .btn-open { padding:5px 12px; background:var(--navy); color:var(--blue); border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; }
    .btn-open:hover { background:var(--navy-2); }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:14px; width:680px; max-width:95vw; max-height:90vh; overflow-y:auto; padding:28px; }
    .modal-title { font-size:17px; font-weight:700; color:var(--navy); margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
    .modal-close { cursor:pointer; color:var(--gray-400); font-size:20px; line-height:1; background:none; border:none; }
    .modal-close:hover { color:var(--navy); }
    .modal-section { margin-bottom:20px; }
    .modal-section-title { font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .info-item { background:var(--gray-50); border-radius:8px; padding:10px 14px; }
    .info-label { font-size:11px; color:var(--gray-400); margin-bottom:2px; }
    .info-val { font-size:13px; font-weight:600; color:var(--navy); }
    .parts-list { display:flex; flex-direction:column; gap:8px; }
    .part-row { background:var(--gray-50); border-radius:8px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
    .part-name { font-size:13px; font-weight:600; color:var(--navy); }
    .part-meta { font-size:11px; color:var(--gray-400); margin-top:2px; }
    .part-price { font-size:14px; font-weight:700; color:var(--navy); }
    .admin-form { display:grid; gap:12px; }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .admin-form label { font-size:12px; font-weight:600; color:var(--gray-700); display:block; margin-bottom:4px; }
    .admin-form input, .admin-form select, .admin-form textarea { width:100%; padding:8px 12px; border:1px solid var(--gray-200); border-radius:8px; font-size:13px; font-family:inherit; outline:none; }
    .admin-form input:focus, .admin-form select:focus, .admin-form textarea:focus { border-color:var(--blue); }
    .admin-form textarea { resize:vertical; min-height:70px; }
    .btn-save-modal { padding:10px 24px; background:var(--navy); color:var(--blue); border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; width:100%; margin-top:4px; }
    .btn-save-modal:hover { background:var(--navy-2); }
    .text-mono { font-family:monospace; font-weight:600; }
    .text-muted { color:var(--gray-400); }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="logo.svg" alt="DetalHub"></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Управление</div>
      <a class="nav-link active" id="nav-orders" href="#" onclick="showTab('orders');return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Все заказы
      </a>
      <a class="nav-link" id="nav-projects" href="#" onclick="showTab('projects');return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        Все проекты
      </a>
      <div class="sidebar-section">Аккаунт</div>
      <a href="#" class="nav-link" onclick="doLogout();return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        Выйти
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar-sm">A</div>
      <div style="min-width:0">
        <div class="sidebar-user-name">Менеджер</div>
        <div class="sidebar-user-role">Администратор</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <!-- ORDERS TAB -->
    <div id="tab-orders">
      <div class="topbar">
        <span class="topbar-title">Все заказы</span>
      </div>
      <div class="page-content">
        <div class="stat-cards">
          <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Всего заказов</div></div>
          <div class="stat-card"><div class="stat-val" id="stat-new">—</div><div class="stat-label">Новых</div></div>
          <div class="stat-card"><div class="stat-val" id="stat-work">—</div><div class="stat-label">В работе</div></div>
          <div class="stat-card"><div class="stat-val" id="stat-done">—</div><div class="stat-label">Выполнено</div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Заказы клиентов</span>
            <div class="filters">
              <button class="filter-btn active" onclick="filterOrders('all',this)">Все</button>
              <button class="filter-btn" onclick="filterOrders('Новый',this)">Новые</button>
              <button class="filter-btn" onclick="filterOrders('В работе',this)">В работе</button>
              <button class="filter-btn" onclick="filterOrders('Готов',this)">Готовы</button>
              <button class="filter-btn" onclick="filterOrders('Выполнен',this)">Выполнены</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>№ КП</th><th>Дата</th><th>Клиент</th><th>Деталей</th><th>Сумма</th><th>Статус</th><th></th>
              </tr></thead>
              <tbody id="orders-body"><tr><td colspan="7"><div class="empty-state"><p>Загружаем...</p></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- PROJECTS TAB -->
    <div id="tab-projects" style="display:none">
      <div class="topbar">
        <span class="topbar-title">Все проекты</span>
      </div>
      <div class="page-content">
        <div class="card">
          <div class="card-header"><span class="card-title">Черновики клиентов</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>№ КП</th><th>Дата</th><th>Клиент</th><th>Деталей</th><th>Сумма</th><th>Статус</th><th></th>
              </tr></thead>
              <tbody id="projects-body"><tr><td colspan="7"><div class="empty-state"><p>Загружаем...</p></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">Заказ</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const AUTH_URL = 'https://functions.yandexcloud.net/d4eqjukg4f4n7p4v8j8g';
let allOrders = [], allProjects = [], currentFilter = 'all';

function doLogout() {
  localStorage.removeItem('isLoggedIn');
  localStorage.removeItem('userId');
  localStorage.removeItem('userRole');
  location.href = 'auth.html';
}

function init() {
  if (localStorage.getItem('userRole') !== 'admin') { location.href = 'auth.html'; return; }
  loadOrders();
  loadProjects();
}

function showTab(tab) {
  document.getElementById('tab-orders').style.display   = tab === 'orders'   ? '' : 'none';
  document.getElementById('tab-projects').style.display = tab === 'projects' ? '' : 'none';
  document.getElementById('nav-orders').classList.toggle('active',   tab === 'orders');
  document.getElementById('nav-projects').classList.toggle('active', tab === 'projects');
}

function badgeHtml(status) {
  const map = {
    'Новый':'badge-new', 'В работе':'badge-work', 'Готов':'badge-done',
    'Выполнен':'badge-done', 'Черновик':'badge-draft',
    'Ручной расчёт':'badge-manual', 'Отменён':'badge-cancel'
  };
  return `<span class="badge ${map[status]||'badge-draft'}">${status||'—'}</span>`;
}

async function loadOrders() {
  try {
    const r = await fetch(AUTH_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'getAllOrders'}) });
    const data = await r.json();
    allOrders = data.orders || [];
    updateStats();
    renderOrders(allOrders);
  } catch(e) {
    document.getElementById('orders-body').innerHTML = `<tr><td colspan="7"><div class="empty-state"><h3>Ошибка загрузки</h3></div></td></tr>`;
  }
}

async function loadProjects() {
  try {
    const r = await fetch(AUTH_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'getAllProjects'}) });
    const data = await r.json();
    allProjects = data.projects || [];
    renderProjects(allProjects);
  } catch(e) {}
}

function updateStats() {
  document.getElementById('stat-total').textContent = allOrders.length;
  document.getElementById('stat-new').textContent   = allOrders.filter(o=>o.status==='Новый').length;
  document.getElementById('stat-work').textContent  = allOrders.filter(o=>o.status==='В работе').length;
  document.getElementById('stat-done').textContent  = allOrders.filter(o=>o.status==='Выполнен'||o.status==='Готов').length;
}

function filterOrders(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders(status === 'all' ? allOrders : allOrders.filter(o=>o.status===status));
}

function renderOrders(orders) {
  const tbody = document.getElementById('orders-body');
  if (!orders.length) { tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><h3>Нет заказов</h3></div></td></tr>`; return; }
  tbody.innerHTML = orders.map(o=>`<tr>
    <td class="text-mono">#${o.quote_number||'—'}</td>
    <td class="text-muted">${o.created_at ? new Date(o.created_at).toLocaleDateString('ru-RU') : '—'}</td>
    <td class="text-muted" style="font-size:11px">${o.user_id||'—'}</td>
    <td><b>${(o.parts||[]).length}</b> дет.</td>
    <td style="font-weight:600">${o.total_price||'—'}</td>
    <td>${badgeHtml(o.status)}</td>
    <td><button class="btn-open" onclick="openOrder('${o.id}')">Открыть</button></td>
  </tr>`).join('');
}

function renderProjects(projects) {
  const tbody = document.getElementById('projects-body');
  if (!projects.length) { tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><h3>Нет проектов</h3></div></td></tr>`; return; }
  tbody.innerHTML = projects.map(p=>`<tr>
    <td class="text-mono">#${p.quote_number||'—'}</td>
    <td class="text-muted">${p.created_at ? new Date(p.created_at).toLocaleDateString('ru-RU') : '—'}</td>
    <td class="text-muted" style="font-size:11px">${p.user_id||'—'}</td>
    <td><b>${(p.parts||[]).length}</b> дет.</td>
    <td style="font-weight:600">${p.total_price||'—'}</td>
    <td>${badgeHtml(p.status)}</td>
    <td><button class="btn-open" onclick="openProject('${p.id}')">Открыть</button></td>
  </tr>`).join('');
}

function openOrder(id) {
  const o = allOrders.find(x=>x.id===id);
  if (!o) return;
  document.getElementById('modal-title-text').textContent = `Заказ #${o.quote_number||'—'}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Информация о заказе</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">№ КП</div><div class="info-val">#${o.quote_number||'—'}</div></div>
        <div class="info-item"><div class="info-label">Дата</div><div class="info-val">${o.created_at ? new Date(o.created_at).toLocaleString('ru-RU') : '—'}</div></div>
        <div class="info-item"><div class="info-label">Статус</div><div class="info-val">${o.status||'—'}</div></div>
        <div class="info-item"><div class="info-label">Сумма клиента</div><div class="info-val">${o.total_price||'—'}</div></div>
        <div class="info-item"><div class="info-label">Срок</div><div class="info-val">${o.lead_time||'—'}</div></div>
        <div class="info-item"><div class="info-label">Вес</div><div class="info-val">${o.total_weight||'—'}</div></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Детали (${(o.parts||[]).length} шт.)</div>
      <div class="parts-list">
        ${(o.parts||[]).map(p=>`
          <div class="part-row">
            <div>
              <div class="part-name">${p.name||'—'}</div>
              <div class="part-meta">${p.tech||''} · ${p.material||''} · ${p.qty||1} шт.${p.dims ? ' · '+p.dims.x+'×'+p.dims.y+'×'+p.dims.z+' мм' : ''}</div>
            </div>
            <div class="part-price">${p.price ? p.price.toLocaleString('ru-RU')+' ₽' : '—'}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Действия менеджера</div>
      <div class="admin-form">
        <div class="form-row-2">
          <div>
            <label>Статус заказа</label>
            <select id="admin-status">
              <option ${o.status==='Новый'?'selected':''}>Новый</option>
              <option ${o.status==='В работе'?'selected':''}>В работе</option>
              <option ${o.status==='Ручной расчёт'?'selected':''}>Ручной расчёт</option>
              <option ${o.status==='Готов'?'selected':''}>Готов</option>
              <option ${o.status==='Выполнен'?'selected':''}>Выполнен</option>
              <option ${o.status==='Отменён'?'selected':''}>Отменён</option>
            </select>
          </div>
          <div>
            <label>Цена (инженер)</label>
            <input type="text" id="admin-price" value="${o.admin_price||o.total_price||''}" placeholder="15 000 ₽">
          </div>
        </div>
        <div>
          <label>Срок изготовления</label>
          <input type="text" id="admin-lead" value="${o.lead_time||''}" placeholder="5–7 рабочих дней">
        </div>
        <div>
          <label>Комментарий инженера</label>
          <textarea id="admin-comment" placeholder="Технические замечания...">${o.admin_comment||''}</textarea>
        </div>
        <button class="btn-save-modal" onclick="saveOrder('${o.id}')">Сохранить изменения</button>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function openProject(id) {
  const p = allProjects.find(x=>x.id===id);
  if (!p) return;
  document.getElementById('modal-title-text').textContent = `Проект #${p.quote_number||'—'}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Информация о проекте</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">№ КП</div><div class="info-val">#${p.quote_number||'—'}</div></div>
        <div class="info-item"><div class="info-label">Дата</div><div class="info-val">${p.created_at ? new Date(p.created_at).toLocaleString('ru-RU') : '—'}</div></div>
        <div class="info-item"><div class="info-label">Статус</div><div class="info-val">${p.status||'—'}</div></div>
        <div class="info-item"><div class="info-label">Сумма</div><div class="info-val">${p.total_price||'—'}</div></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Детали (${(p.parts||[]).length} шт.)</div>
      <div class="parts-list">
        ${(p.parts||[]).map(pt=>`
          <div class="part-row">
            <div>
              <div class="part-name">${pt.name||'—'}</div>
              <div class="part-meta">${pt.tech||''} · ${pt.material||''} · ${pt.qty||1} шт.</div>
            </div>
            <div class="part-price">${pt.price ? pt.price.toLocaleString('ru-RU')+' ₽' : '—'}</div>
          </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

async function saveOrder(id) {
  const status  = document.getElementById('admin-status').value;
  const price   = document.getElementById('admin-price').value;
  const lead    = document.getElementById('admin-lead').value;
  const comment = document.getElementById('admin-comment').value;
  try {
    const r = await fetch(AUTH_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'updateOrderStatus', orderId:id, status, adminPrice:price, leadTime:lead, adminComment:comment })
    });
    const data = await r.json();
    if (data.success) {
      const o = allOrders.find(x=>x.id===id);
      if (o) { o.status=status; o.admin_price=price; o.lead_time=lead; o.admin_comment=comment; }
      updateStats();
      renderOrders(currentFilter==='all' ? allOrders : allOrders.filter(x=>x.status===currentFilter));
      closeModal();
    } else {
      alert('Ошибка: ' + data.error);
    }
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target===document.getElementById('modal')) closeModal(); });

init();
</script>
</body>
</html>

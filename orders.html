<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мои заказы — DetalHub</title>
  <link rel="stylesheet" href="cabinet.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .proj-tabs { display:flex; gap:0; border-bottom:2px solid var(--gray-200); margin-bottom:24px; }
    .proj-tab { padding:10px 20px; font-size:13px; font-weight:500; color:var(--gray-400); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; background:none; border-top:none; border-left:none; border-right:none; }
    .proj-tab.active { color:var(--navy); border-bottom-color:var(--navy); font-weight:600; }

    .order-cards { display:flex; flex-direction:column; gap:12px; }
    .order-card { background:#fff; border:1px solid var(--gray-200); border-radius:12px; overflow:hidden; }
    .order-card-top { display:flex; align-items:stretch; }
    .order-card-thumb { width:120px; flex-shrink:0; background:var(--gray-50); display:flex; align-items:center; justify-content:center; border-right:1px solid var(--gray-100); }
    .order-card-body { flex:1; padding:14px 18px; }
    .order-card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .order-card-num { font-size:14px; font-weight:700; color:var(--navy); }
    .order-card-date { font-size:12px; color:var(--gray-400); }
    .order-card-meta { display:flex; gap:24px; margin-top:10px; flex-wrap:wrap; }
    .order-card-meta-item { font-size:12px; color:var(--gray-400); }
    .order-card-meta-item strong { display:block; font-size:13px; color:var(--gray-700); font-weight:600; margin-top:2px; }
    .order-card-actions { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; border-top:1px solid var(--gray-100); background:var(--gray-50); }
    .order-card-btns { display:flex; gap:12px; }
    .btn-text { background:none; border:none; font-size:12px; color:var(--gray-400); cursor:pointer; display:flex; align-items:center; gap:5px; padding:0; }
    .btn-text:hover { color:var(--navy); }

    /* Детали заказа (раскрывается) */
    .order-detail { display:none; border-top:1px solid var(--gray-100); padding:16px 18px; background:#fafbfc; }
    .order-detail.open { display:block; }
    .detail-section-title { font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .parts-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
    .part-card { background:#fff; border:1px solid var(--gray-200); border-radius:8px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
    .part-card-name { font-size:13px; font-weight:600; color:var(--navy); }
    .part-card-meta { font-size:11px; color:var(--gray-400); margin-top:2px; }
    .part-card-price { font-size:14px; font-weight:700; color:var(--navy); white-space:nowrap; }
    .manager-comment { background:#e8f4ff; border:1px solid #b3d9f7; border-radius:8px; padding:12px 16px; font-size:13px; color:#185fa5; margin-bottom:14px; }
    .manager-comment-label { font-size:11px; font-weight:700; color:#185fa5; margin-bottom:4px; }
    .detail-actions { display:flex; gap:10px; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="logo.svg" alt="DetalHub"></div>
    <div class="sidebar-lang">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Кабинет</div>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Панель управления</span>
      </a>
      <a href="projects.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        <span>Мои проекты</span>
      </a>
      <a href="orders.html" class="nav-link active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span>Мои заказы</span>
      </a>
      <div class="sidebar-section">Аккаунт</div>
      <a href="profile.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>Профиль</span>
      </a>
      <a href="#" class="nav-link" onclick="logout();return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        <span>Выйти</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar-sm js-avatar" onclick="window.location.href='profile.html'">?</div>
      <div style="min-width:0">
        <div class="sidebar-user-name js-user-name">—</div>
        <div class="sidebar-user-role">Клиент</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Мои заказы</span>
      <div class="topbar-right">
        <a href="quote.html" class="btn btn-primary">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Новый запрос
        </a>
      </div>
    </div>
    <div class="page-content">
      <div class="proj-tabs">
        <button class="proj-tab active" onclick="switchTab('active', this)">Активные</button>
        <button class="proj-tab" onclick="switchTab('done', this)">Завершённые</button>
      </div>
      <div id="ordersList"></div>
    </div>
  </div>
</div>

<script src="cabinet.js"></script>
<script>
const AUTH_URL = 'https://functions.yandexcloud.net/d4eqjukg4f4n7p4v8j8g';
let allOrders = [];
let currentTab = 'active';


const DONE_STATUSES = ['Выполнен', 'Отменён'];

const statusMap = {
  'Новый':         { cls:'badge-new',      label:'Новый' },
  'В работе':      { cls:'badge-progress', label:'В работе' },
  'Ручной расчёт': { cls:'badge-review',   label:'Ручной расчёт' },
  'Готов':         { cls:'badge-done',     label:'Готов' },
  'Выполнен':      { cls:'badge-done',     label:'Выполнен' },
  'Отменён':       { cls:'badge-draft',    label:'Отменён' },
};

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.proj-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const cont = document.getElementById('ordersList');
  const filtered = currentTab === 'active'
    ? allOrders.filter(o => !DONE_STATUSES.includes(o.status))
    : allOrders.filter(o => DONE_STATUSES.includes(o.status));

  if (!filtered.length) {
    cont.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="#d1d5db" stroke-width="1" viewBox="0 0 24 24" style="display:block;margin:0 auto 12px"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <h3>${currentTab === 'active' ? 'Активных заказов нет' : 'Завершённых заказов нет'}</h3>
      <p>Оформите заказ на странице нового запроса</p>
    </div>`;
    return;
  }

  cont.innerHTML = `<div class="order-cards">${filtered.map(o => {
    const s = statusMap[o.status] || { cls:'badge-new', label: o.status||'Новый' };
    const price = o.admin_price || o.total_price || '—';
    const lead = o.lead_time || '—';
    const qty = (o.parts||[]).reduce((s,p) => s+(p.qty||1), 0);

    const TECH_LABELS = {cnc_mill:'ЧПУ-фрезерование',cnc_turn:'ЧПУ-токарная',fdm:'3D-печать FDM',sla:'3D-печать SLA',sls:'3D-печать SLS',mjf:'3D-печать MJF',laser:'Лазерная резка',other:'Прочее'};
    const partsHtml = (o.parts||[]).map((p,i) => {
      const dims = p.dims && p.dims.x && p.dims.x!=='—' ? `${p.dims.x}×${p.dims.y}×${p.dims.z} мм` : null;
      const rows = [
        ['Технология', TECH_LABELS[p.tech]||p.tech||'—'],
        ['Материал', p.material||'—'],
        ['Количество', `${p.qty||1} шт.`],
        dims ? ['Габариты', dims] : null,
        p.weight ? ['Вес', p.weight+' г'] : null,
        p.finish ? ['Отделка', p.finish] : null,
        p.tolerance ? ['Допуск', p.tolerance] : null,
        p.color ? ['Цвет', p.color] : null,
        p.notes ? ['Примечания', p.notes] : null,
      ].filter(Boolean);
      return `<div class="part-card" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="part-card-name">${i+1}. ${p.name||'—'}</div>
          <div class="part-card-price">${p.price ? p.price.toLocaleString('ru-RU')+' ₽' : '—'}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px 16px">
          ${rows.map(([k,v])=>`<div class="part-card-meta"><span style="color:var(--gray-400)">${k}:</span> <span style="color:var(--gray-700);font-weight:500">${v}</span></div>`).join('')}
        </div>
      </div>`;
    }).join('');

    const commentHtml = o.admin_comment ? `
      <div class="manager-comment">
        <div class="manager-comment-label">Комментарий менеджера</div>
        ${o.admin_comment}
      </div>` : '';

    return `<div class="order-card">
      <div class="order-card-top">
        <div class="order-card-thumb">
          <svg width="48" height="48" fill="none" stroke="#9ca3af" stroke-width="1" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
        <div class="order-card-body">
          <div class="order-card-head">
            <div>
              <div class="order-card-num">Заказ №${o.quote_number||'—'}</div>
              <span class="badge ${s.cls}" style="margin-top:6px;display:inline-flex">${s.label}</span>
            </div>
            <div class="order-card-date">Оформлен: ${new Date(o.created_at).toLocaleDateString('ru-RU')}</div>
          </div>
          <div class="order-card-meta">
            <div class="order-card-meta-item">Количество<strong>${(o.parts||[]).length} позиц. / ${qty} шт.</strong></div>
            <div class="order-card-meta-item">Срок<strong>${lead}</strong></div>
            <div class="order-card-meta-item">Стоимость<strong>${price}</strong></div>
          </div>
        </div>
      </div>
      <div class="order-detail" id="detail-${o.id}">
        ${commentHtml}
        <div class="detail-section-title">Состав заказа</div>
        <div class="parts-grid">${partsHtml}</div>
        <div class="detail-actions">
          <button class="btn btn-primary btn-sm" onclick="reorder('${o.id}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
            Заказать снова
          </button>
          <button class="btn btn-ghost btn-sm" onclick="downloadPDF('${o.id}')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Скачать PDF
          </button>
        </div>
      </div>
      <div class="order-card-actions">
        <div class="order-card-btns">
          <button class="btn-text" onclick="toggleDetail('${o.id}', this)">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Состав заказа
          </button>
        </div>
        <span style="font-size:12px;color:var(--gray-400)">№${o.quote_number}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function toggleDetail(id, btn) {
  const det = document.getElementById('detail-' + id);
  const isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  btn.style.color = isOpen ? '' : 'var(--navy)';
}

function reorder(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  localStorage.setItem('reorderParts', JSON.stringify(o.parts || []));
  location.href = 'quote.html?reorder=1';
}

function downloadPDF(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  const TECH = {cnc_mill:'ЧПУ-фрезерование',cnc_turn:'ЧПУ-токарная',fdm:'3D-печать FDM',sla:'3D-печать SLA',sls:'3D-печать SLS',mjf:'3D-печать MJF',laser:'Лазерная резка',other:'Прочее'};
  const dateStr = new Date(o.created_at).toLocaleDateString('ru-RU');
  const totalPrice = o.admin_price || o.total_price || '—';
  const partsRows = (o.parts||[]).map((p,i) => `
    <tr style="background:${i%2?'#f9fafb':'#fff'}">
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:center">${i+1}</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb">${p.name||'—'}</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb">${TECH[p.tech]||p.tech||'—'}</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb">${p.material||'—'}</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:center">${p.qty||1} шт.</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:right;font-weight:600">${p.price ? p.price.toLocaleString('ru-RU')+' ₽' : '—'}</td>
    </tr>`).join('');
  const commentBlock = o.admin_comment ? `
    <div style="margin-top:16px;background:#e8f4ff;border:1px solid #b3d9f7;border-radius:6px;padding:10px 14px;font-size:11px;color:#185fa5">
      <b>Комментарий менеджера:</b> ${o.admin_comment}
    </div>` : '';
  const tpl = document.createElement('div');
  tpl.style.cssText = 'position:absolute;top:0;left:0;width:794px;visibility:hidden;z-index:-1';
  document.body.appendChild(tpl);
  tpl.innerHTML = `
    <div style="font-family:Arial,sans-serif;padding:16mm;color:#111">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #071f2a;padding-bottom:12px;margin-bottom:16px">
        <div>
          <img src="logo.svg" style="height:44px;display:block;margin-bottom:4px">
          <div style="font-size:10px;color:#9ca3af">detalhub.com</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:700;color:#071f2a">СЧЁТ НА ОПЛАТУ №${o.quote_number}</div>
          <div style="font-size:11px;color:#6b7280">от ${dateStr}</div>
        </div>
      </div>
      <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:11px">
        <b style="color:#071f2a">Поставщик: ИП Гончарова Екатерина Николаевна</b><br>
        ИНН: 526013657707 &nbsp;·&nbsp; АО «ТБанк» &nbsp;·&nbsp; БИК: 044525974<br>
        Р/с: 40802810300001603387 &nbsp;·&nbsp; Корр. счёт: 30101810145250000974
      </div>
      <div style="font-size:11px;color:#6b7280;margin-bottom:12px">
        Статус: <b style="color:#071f2a">${o.status||'Новый'}</b> &nbsp;·&nbsp;
        Срок изготовления: <b style="color:#071f2a">${o.lead_time||'уточняется'}</b>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px">
        <thead>
          <tr style="background:#071f2a;color:#7dc3fd">
            <th style="padding:8px;width:30px">№</th>
            <th style="padding:8px;text-align:left">Наименование</th>
            <th style="padding:8px;text-align:left">Технология</th>
            <th style="padding:8px;text-align:left">Материал</th>
            <th style="padding:8px;width:60px">Кол-во</th>
            <th style="padding:8px;width:80px;text-align:right">Цена</th>
          </tr>
        </thead>
        <tbody>${partsRows}</tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="padding:9px 8px;border:1px solid #e5e7eb;text-align:right;font-weight:700;font-size:12px">Итого к оплате:</td>
            <td style="padding:9px 8px;border:1px solid #e5e7eb;text-align:right;font-weight:700;font-size:13px;color:#071f2a">${totalPrice}</td>
          </tr>
        </tfoot>
      </table>
      ${commentBlock}
      <div style="margin-top:20px;font-size:9px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:8px">
        Счёт сформирован автоматически · DetalHub (detalhub.com) · ИП Гончарова Е.Н. · ИНН 526013657707
      </div>
    </div>`;
  html2pdf().from(tpl).set({
    filename: `DetalHub_Счёт_${o.quote_number}.pdf`,
    jsPDF: { unit:'mm', format:'a4' },
    html2canvas: { scale:2, backgroundColor:'#fff' }
  }).save().then(() => document.body.removeChild(tpl));
}

async function renderOrders() {
  const cont = document.getElementById('ordersList');
  cont.innerHTML = '<div class="empty-state"><p>Загружаем заказы...</p></div>';
  const userId = localStorage.getItem('userId');
  if (!userId) {
    cont.innerHTML = '<div class="empty-state"><h3>Заказов пока нет</h3></div>';
    return;
  }
  try {
    const r = await fetch(AUTH_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'getOrders', userId })
    });
    const data = await r.json();
    allOrders = (data.orders||[]).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
    renderList();
  } catch(e) {
    cont.innerHTML = '<div class="empty-state"><h3>Ошибка загрузки заказов</h3><p>'+e.message+'</p></div>';
  }
}

renderOrders();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мои заказы — DetalHub</title>
  <link rel="stylesheet" href="cabinet.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="logo.svg" alt="DetalHub"></div>
    <div class="sidebar-lang">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Кабинет</div>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span data-i18n="nav_dashboard">Панель управления</span>
      </a>
      <a href="projects.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        <span data-i18n="nav_projects">Мои проекты</span>
      </a>
      <a href="orders.html" class="nav-link active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span data-i18n="nav_orders">Мои заказы</span>
      </a>
      <div class="sidebar-section">Аккаунт</div>
      <a href="profile.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span data-i18n="nav_profile">Профиль</span>
      </a>
      <a href="#" class="nav-link" onclick="logout();return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        <span data-i18n="nav_logout">Выйти</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar-sm js-avatar" onclick="window.location.href='profile.html'">?</div>
      <div style="min-width:0">
        <div class="sidebar-user-name js-user-name">—</div>
        <div class="sidebar-user-role" data-i18n="role_client">Клиент</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Мои заказы</span>
      <div class="topbar-right">
        <a href="dashboard.html" class="btn btn-primary">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          <span data-i18n="new_order">Новый заказ</span>
        </a>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title">История заказов</span>
        </div>
        <div id="ordersList"></div>
      </div>
    </div>
  </div>
</div>
<script src="cabinet.js"></script>
<script>
const statusMap = {
  'Новый':     { cls:'badge-new',      label:'Новый' },
  'В работе':  { cls:'badge-progress', label:'В работе' },
  'На проверке':{ cls:'badge-review',  label:'На проверке' },
  'Выполнен':  { cls:'badge-done',     label:'Выполнен' },
};

function renderOrders() {
  const orders = JSON.parse(localStorage.getItem('orders')||'[]').reverse();
  const cont = document.getElementById('ordersList');
  if (!orders.length) {
    cont.innerHTML = '<div class="empty-state"><h3>Заказов пока нет</h3><p>Загрузите детали и оформите заказ на панели управления</p></div>';
    return;
  }
  cont.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>№ заказа</th><th>Дата</th><th>Деталей</th><th>Срок</th><th>Сумма</th><th>Статус</th>
        </tr></thead>
        <tbody>
          ${orders.map(o => {
            const s = statusMap[o.status] || { cls:'badge-new', label: o.status||'Новый' };
            return `<tr>
              <td class="text-mono">#${o.quoteNumber}</td>
              <td class="text-muted">${o.orderDate}</td>
              <td><b>${o.parts.length}</b> дет.</td>
              <td class="text-muted">${o.leadTime}</td>
              <td style="font-weight:600">${o.totalPrice}</td>
              <td><span class="badge ${s.cls}">${s.label}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}
renderOrders();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход в систему — DetalHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { 
      background: #f5f7fa; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
    }
    
    .auth-container {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo img {
      max-width: 160px;
      height: auto;
    }
    
    h2 {
      color: #1a1a1a;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #0066CC;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    
    .checkbox-group input {
      width: 18px;
      height: 18px;
    }
    
    .checkbox-group label {
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    .btn {
      width: 100%;
      padding: 1rem;
      background: #0066CC;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #0052A3;
    }
    
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: #999;
      font-size: 0.9rem;
    }
    
    .link {
      color: #0066CC;
      text-decoration: none;
      font-weight: 500;
    }
    
    .link:hover {
      text-decoration: underline;
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .success {
      background: #efe;
      color: #3c3;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #eee;
    }
    
    .tab {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 1rem;
      color: #666;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    
    .tab.active {
      color: #0066CC;
      border-bottom-color: #0066CC;
    }
    
    .form-section {
      display: none;
    }
    
    .form-section.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <img src="logo.svg" alt="DetalHub">
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Вход</button>
      <button class="tab" onclick="switchTab('register')">Регистрация</button>
    </div>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <!-- Форма входа -->
    <div id="loginForm" class="form-section active">
      <h2>С возвращением!</h2>
      <p class="subtitle">Введите данные для входа в личный кабинет</p>
      
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Пароль</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Запомнить меня</label>
        </div>
        
        <button type="submit" class="btn">Войти</button>
      </form>
      
      <div class="divider">или</div>
      <p style="text-align: center; color: #666; font-size: 0.9rem;">
        <a href="#" class="link">Забыли пароль?</a>
      </p>
    </div>
    
    <!-- Форма регистрации -->
    <div id="registerForm" class="form-section">
      <h2>Создать аккаунт</h2>
      <p class="subtitle">Заполните данные для регистрации</p>
      
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regName">Имя</label>
          <input type="text" id="regName" required placeholder="Иван Иванов">
        </div>
        
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
          <label for="regPhone">Телефон</label>
          <input type="tel" id="regPhone" placeholder="+7 (999) 999-99-99">
        </div>
        
        <div class="form-group">
          <label for="regCompany">Компания (необязательно)</label>
          <input type="text" id="regCompany" placeholder="ООО Компания">
        </div>
        
        <div class="form-group">
          <label for="regPassword">Пароль</label>
          <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
        </div>
        
        <div class="form-group">
          <label for="regPasswordConfirm">Подтвердите пароль</label>
          <input type="password" id="regPasswordConfirm" required placeholder="••••••••" minlength="6">
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="agreeTerms" required>
          <label for="agreeTerms">Согласен с <a href="#" class="link">условиями использования</a></label>
        </div>
        
        <button type="submit" class="btn">Зарегистрироваться</button>
      </form>
    </div>
  </div>

  <script>
    // ==========================================
    // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    // ==========================================
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.tab');
      const forms = document.querySelectorAll('.form-section');
      
      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
      
      hideMessages();
    }
    
    // ==========================================
    // ВХОД В СИСТЕМУ
    // ==========================================
    function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const remember = document.getElementById('rememberMe').checked;
      
      // Получаем пользователей из localStorage
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      
      // Ищем пользователя
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        // Успешный вход
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userId', user.id);
        localStorage.setItem('userProfile', JSON.stringify({
          name: user.name,
          email: user.email,
          phone: user.phone,
          company: user.company
        }));
        
        if (remember) {
          localStorage.setItem('rememberMe', 'true');
        }
        
        showMessage('success', '✅ Вход выполнен! Перенаправление...');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        showMessage('error', '❌ Неверный email или пароль');
      }
    }
    
    // ==========================================
    // РЕГИСТРАЦИЯ
    // ==========================================
    function handleRegister(e) {
      e.preventDefault();
      hideMessages();
      
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const company = document.getElementById('regCompany').value.trim();
      const password = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;
      
      // Проверка паролей
      if (password !== passwordConfirm) {
        showMessage('error', '❌ Пароли не совпадают');
        return;
      }
      
      // Проверка длины пароля
      if (password.length < 6) {
        showMessage('error', '❌ Пароль должен быть не менее 6 символов');
        return;
      }
      
      // Получаем существующих пользователей
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      
      // Проверяем, есть ли такой email
      if (users.find(u => u.email === email)) {
        showMessage('error', '❌ Пользователь с таким email уже существует');
        return;
      }
      
      // Создаём нового пользователя
      const newUser = {
        id: Date.now().toString(),
        name: name,
        email: email,
        phone: phone,
        company: company,
        password: password,
        registeredAt: new Date().toLocaleString('ru-RU')
      };
      
      // Сохраняем
      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));
      
      showMessage('success', '✅ Регистрация успешна! Выполняем вход...');
      
      // Автоматический вход
      setTimeout(() => {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userId', newUser.id);
        localStorage.setItem('userProfile', JSON.stringify({
          name: newUser.name,
          email: newUser.email,
          phone: newUser.phone,
          company: newUser.company
        }));
        
        window.location.href = 'dashboard.html';
      }, 1500);
    }
    
    // ==========================================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ==========================================
    function showMessage(type, message) {
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      
      if (type === 'error') {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
      } else {
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
      }
    }
    
    function hideMessages() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }
    
    // ==========================================
    // ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ
    // ==========================================
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>

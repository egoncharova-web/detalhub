<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — DetalHub</title>
  <link rel="stylesheet" href="cabinet.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="logo.svg" alt="DetalHub"></div>
    <div class="sidebar-lang">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Кабинет</div>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span data-i18n="nav_dashboard">Панель управления</span>
      </a>
      <a href="projects.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        <span data-i18n="nav_projects">Мои проекты</span>
      </a>
      <a href="orders.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span data-i18n="nav_orders">Мои заказы</span>
      </a>
      <div class="sidebar-section">Аккаунт</div>
      <a href="profile.html" class="nav-link active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span data-i18n="nav_profile">Профиль</span>
      </a>
      <a href="#" class="nav-link" onclick="logout();return false;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        <span data-i18n="nav_logout">Выйти</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar-sm js-avatar">?</div>
      <div style="min-width:0">
        <div class="sidebar-user-name js-user-name">—</div>
        <div class="sidebar-user-role" data-i18n="role_client">Клиент</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Профиль</span>
      <div class="topbar-right">
        <a href="dashboard.html" class="btn btn-primary">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          <span data-i18n="new_order">Новый запрос</span>
        </a>
      </div>
    </div>

    <div class="page-content">
      <div style="max-width:640px;">

        <!-- Avatar + name block -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-body" style="display:flex;align-items:center;gap:20px;">
            <div id="avatarBig" style="width:64px;height:64px;border-radius:50%;background:var(--navy);color:#7dc3fd;font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;">?</div>
            <div>
              <div id="displayName" style="font-size:17px;font-weight:600;color:var(--gray-900)">—</div>
              <div id="displayEmail" style="font-size:13px;color:var(--gray-400);margin-top:2px;">—</div>
            </div>
          </div>
        </div>

        <!-- Info notice -->
        <div style="background:#e8f4ff;border:1px solid #b3d9f7;border-radius:var(--radius);padding:11px 16px;font-size:12px;color:#185fa5;margin-bottom:20px;">
          Эти данные автоматически подставляются в коммерческие предложения и счета.
        </div>

        <div id="alert-success" class="alert alert-success">Данные сохранены.</div>
        <div id="alert-error"   class="alert alert-error">Ошибка при сохранении.</div>

        <!-- Form -->
        <div class="card">
          <div class="card-header"><span class="card-title">Личные данные</span></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Имя и фамилия</label>
                <input type="text" class="form-control" id="name" placeholder="Иван Иванов">
              </div>
              <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="tel" class="form-control" id="phone" placeholder="+7 (999) 999-99-99">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="ivan@company.com">
            </div>
          </div>

          <div class="card-header" style="border-top:1px solid var(--gray-100);"><span class="card-title">Реквизиты компании</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Название компании</label>
              <input type="text" class="form-control" id="company" placeholder="ООО «Ромашка»">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">ИНН</label>
                <input type="text" class="form-control" id="inn" placeholder="7700000000">
              </div>
              <div class="form-group">
                <label class="form-label">КПП</label>
                <input type="text" class="form-control" id="kpp" placeholder="770000000">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Юридический адрес</label>
              <input type="text" class="form-control" id="address" placeholder="г. Москва, ул. Примерная, д. 1">
            </div>
          </div>

          <div class="card-body" style="border-top:1px solid var(--gray-100);padding-top:16px;">
            <button class="btn btn-primary" onclick="saveProfile()" style="padding:10px 28px;">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Сохранить изменения
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="cabinet.js"></script>
<script>
const AUTH_URL = 'https://functions.yandexcloud.net/d4eqjukg4f4n7p4v8j8g';

function applyProfile(p) {
  ['name','phone','email','company'].forEach(id => {
    const el = document.getElementById(id);
    if (el && p[id]) el.value = p[id];
  });
  // inn/kpp/address — только localStorage
  const local = JSON.parse(localStorage.getItem('userProfile')||'{}');
  ['inn','kpp','address'].forEach(id => {
    const el = document.getElementById(id);
    if (el && local[id]) el.value = local[id];
  });
  const initials = (p.name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  document.getElementById('avatarBig').textContent = initials || '?';
  document.getElementById('displayName').textContent = p.name || '—';
  document.getElementById('displayEmail').textContent = p.email || '—';
}

async function loadProfile() {
  const userId = localStorage.getItem('userId');
  // Сначала показываем из localStorage
  const cached = JSON.parse(localStorage.getItem('userProfile')||'{}');
  if (cached.name) applyProfile(cached);

  if (!userId) return;
  try {
    const r = await fetch(AUTH_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action:'getProfile', userId })
    });
    const data = await r.json();
    if (data.success && data.profile) {
      applyProfile(data.profile);
      // Обновляем кэш
      const local = JSON.parse(localStorage.getItem('userProfile')||'{}');
      localStorage.setItem('userProfile', JSON.stringify({ ...local, ...data.profile }));
    }
  } catch(e) {}
}

async function saveProfile() {
  const userId = localStorage.getItem('userId');
  const name    = document.getElementById('name').value.trim();
  const phone   = document.getElementById('phone').value.trim();
  const email   = document.getElementById('email').value.trim();
  const company = document.getElementById('company').value.trim();
  const inn     = document.getElementById('inn').value.trim();
  const kpp     = document.getElementById('kpp').value.trim();
  const address = document.getElementById('address').value.trim();

  // Сохраняем всё в localStorage
  localStorage.setItem('userProfile', JSON.stringify({ name, phone, email, company, inn, kpp, address }));

  // name/phone/company — в YDB
  if (userId) {
    try {
      await fetch(AUTH_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action:'updateProfile', userId, name, phone, company })
      });
    } catch(e) {
      document.getElementById('alert-error').classList.add('show');
      setTimeout(() => document.getElementById('alert-error').classList.remove('show'), 3000);
      return;
    }
  }

  const initials = (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  document.getElementById('avatarBig').textContent = initials || '?';
  document.getElementById('displayName').textContent = name || '—';
  document.getElementById('displayEmail').textContent = email || '—';
  document.querySelectorAll('.js-avatar').forEach(el => el.textContent = initials || '?');
  document.querySelectorAll('.js-user-name').forEach(el => el.textContent = name || '—');

  const ok = document.getElementById('alert-success');
  ok.classList.add('show');
  setTimeout(() => ok.classList.remove('show'), 3000);
}

loadProfile();
</script>
</body>
</html>

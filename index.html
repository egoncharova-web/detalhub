<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DetalHub — изготовление деталей по чертежу (ЧПУ, 3D-печать, лазер)</title>
  <meta name="description" content="Закажите изготовление деталей по чертежу: ЧПУ, 3D-печать, лазерная резка. Быстро, точно, без посредников.">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #fff; color: #111; line-height: 1.6; }
    
    header { padding: 2rem 1rem; text-align: center; }
    
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .logo {
      max-width: 300px;
      height: auto;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0066CC;
      color: #fff;
      padding: 0.9rem 2rem;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    .btn:hover { background: #0052A3; transform: translateY(-2px); }
    
    h1 { font-size: 2rem; margin: 1.5rem 0 1rem; color: #333; }
    .subtitle { font-size: 1.1rem; color: #555; max-width: 700px; margin: 0 auto 2rem; }
    
    .main-cta {
      margin: 2rem 0;
    }
    
    .features {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .feature {
      background: #f5f5f5;
      padding: 0.7rem 1.3rem;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
    }
    
    footer { text-align: center; padding: 2rem; color: #777; font-size: 0.9rem; border-top: 1px solid #eee; margin-top: 3rem; }
    
    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal.show { display: flex; }
    
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      max-width: 700px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .modal-header h3 { color: #0066CC; }
    
    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
    }
    
    .close-btn:hover { color: #333; }
    
    .form-section {
      margin-bottom: 1.5rem;
    }
    
    .form-section h4 {
      color: #333;
      margin-bottom: 0.8rem;
      font-size: 1rem;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      color: #555;
      font-size: 0.9rem;
    }
    
    .form-group select,
    .form-group input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    
    .checkbox-group input[type="checkbox"] {
      width: auto;
    }
    
    @media (max-width: 768px) {
      .logo { max-width: 220px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="logo.svg" alt="DetalHub" class="logo">
      <a href="login.html" class="btn">Войти в кабинет →</a>
    </div>
    
    <h1>Изготовление деталей по чертежу</h1>
    <p class="subtitle">
      ЧПУ-обработка, 3D-печать и лазерная резка онлайн. 
      Присылайте чертёж — получите КП за 1 час.
    </p>

    <div class="main-cta">
      <a href="login.html" class="btn" style="font-size: 1.1rem; padding: 1rem 2.5rem;">
        Рассчитать стоимость →
      </a>
    </div>

    <div class="features">
      <div class="feature">⚙️ ЧПУ фрезерование</div>
      <div class="feature">🖨️ 3D-печать</div>
      <div class="feature">✂️ Лазерная резка</div>
    </div>
  </header>

  <footer>
    © 2026 DetalHub. Все права защищены.<br>
    <a href="login.html" style="color: #0066CC;">Войти в кабинет</a>
  </footer>

</body>
</html>
